{% extends 'charts/chart_common.html' %}
{% load i18n %}

{% block chart_title %}{% trans "Income vs. Expenses" %}{% endblock %}

{% block extra_filters %}
  <div class="col-12 mt-1">
      <label class="form-label">{% trans "Group by:" %}</label>
      <div class="btn-group w-100" role="group">
          <input type="radio" class="btn-check" name="group_by" id="group_month" value="month" {% if group_by == 'month' or not group_by %}checked{% endif %}>
          <label class="btn btn-outline-secondary" for="group_month">{% trans "Month" %}</label>

          <input type="radio" class="btn-check" name="group_by" id="group_week" value="week" {% if group_by == 'week' %}checked{% endif %}>
          <label class="btn btn-outline-secondary" for="group_week">{% trans "Week" %}</label>
          
          <input type="radio" class="btn-check" name="group_by" id="group_year" value="year" {% if group_by == 'year' %}checked{% endif %}>
          <label class="btn btn-outline-secondary" for="group_year">{% trans "Year" %}</label>
      </div>
  </div>
{% endblock %}

{% block chart_content %}

  <div id="chart-bar" class="mt-4"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
        const getCurrentTheme = () => document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'dark' : 'light';
        const userLang = document.documentElement.lang || 'en-US';
        const currencyFormatter = new Intl.NumberFormat(userLang, {
            style: 'currency',
            currency: 'EUR'
        });

        const categories = {{ categories|safe }};
        const incomes = {{ incomes|safe }};
        const expenses = {{ expenses|safe }};

        var options = {
            series: [{
                name: '{% trans "Income" %}',
                data: incomes
            }, {
                name: '{% trans "Expenses" %}',
                data: expenses
            }],
            chart: {
                type: 'bar',
                height: 350,
                fontFamily: 'inherit',
                background: 'transparent',
                toolbar: { show: true }
            },
            plotOptions: {
                bar: {
                    horizontal: false,
                    columnWidth: '55%',
                    endingShape: 'rounded'
                },
            },
            dataLabels: { enabled: false },
            stroke: {
                show: true,
                width: 2,
                colors: ['transparent']
            },
            xaxis: {
                categories: categories,
            },
            yaxis: {
                labels: {
                    formatter: function (value) {
                        return currencyFormatter.format(value);
                    }
                }
            },
            colors: ['#198754', '#dc3545'],
            theme: { mode: getCurrentTheme() },
            fill: { opacity: 1 },
            tooltip: {
                y: {
                    formatter: function (val) {
                        return currencyFormatter.format(val);
                    }
                }
            }
        };

        var chart = new ApexCharts(document.querySelector("#chart-bar"), options);
        chart.render();

        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.attributeName === "data-bs-theme") {
                    chart.updateOptions({ theme: { mode: getCurrentTheme() } });
                }
            });
        });
        observer.observe(document.documentElement, { attributes: true });
    });
  </script>
{% endblock %}
