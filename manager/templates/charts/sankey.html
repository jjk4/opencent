{% extends 'charts/chart_common.html' %}
{% load l10n %}
{% load i18n %}
{% load humanize %}

{% block chart_title %}{% trans "Income-Expense Sankey" %}{% endblock %}
{% block chart_content %}
    <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexsankey@1.3.0"></script>
<div id="svg-sankey" style="display: flex; justify-content: center"></div>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const data = {
        nodes: [
            // Budget node
            {
                id: 'budget',
                title: '{% trans "Budget" %}: {{ total_income|floatformat:2|intcomma }} €',
            },
            // Income
            {% for income_category, values in income_by_category.items %}
            {
                id: '{{income_category}}',
                title: '{{values.name}}',
            },
            {% endfor %}
            // Expenses
            {% for expense_category, values in expenses_by_category.items %}
            {
                id: '{{expense_category}}',
                title: '{{values.name}}',
            },
            {% endfor %}
        ],
        edges: [
            // Income
            {% for income_category, values in income_by_category.items %}
            {
                source: '{{income_category}}',
                target: '{% if values.parent %}{{values.parent}}{% else %}budget{% endif %}',
                value: {{values.amount|unlocalize}},
            },
            {% endfor %}
            // Expenses
            {% for expense_category, values in expenses_by_category.items %}
            {
                source: '{% if values.parent %}{{values.parent}}{% else %}budget{% endif %}',
                target: '{{expense_category}}',
                value: {{values.amount|unlocalize}},
            },
            {% endfor %}
        ],
    };

    const getCurrentTheme = () => document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'dark' : 'light';

    const renderSankey = () => {
        const theme = getCurrentTheme();
        
        const textColor = theme === 'dark' ? '#f8f9fa' : '#212529'; 

        const graphOptions = {
            nodeWidth: 10,
            fontColor: textColor,
        };

        const container = document.getElementById('svg-sankey');
        
        container.innerHTML = ''; 

        const s = new ApexSankey(container, graphOptions);
        s.render(data);
    };

    renderSankey();

    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.attributeName === "data-bs-theme") {
                renderSankey();
            }
        });
    });
    
    observer.observe(document.documentElement, { attributes: true });
});
</script>

{% endblock %}
