{% extends 'master.html' %}
{% load i18n %}

{% block content %}
<a href="/charts" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> {% trans "Back to chart overview" %}</a>
    <h1 class="mt-4">{% block chart_title %}{% endblock %}</h1>
    
        <form method="post">
            {% csrf_token %}
            <div id="charts_filter" class="row">
            <div class="col-12 col-md-6">
                <label for="time" class="form-label">{% trans "Period:" %}</label>
                <select name="time" id="time" class="form-select mb-3">
                    <option value="select">{% trans "---- Please select ----" %}</option>
                    <option value="this-month" {% if request.POST.time == 'this-month' %}selected{% endif %}>{% trans "This month" %}</option>
                    <option value="last-month" {% if request.POST.time == 'last-month' %}selected{% endif %}>{% trans "Last month" %}</option>
                    <option value="this-year" {% if request.POST.time == 'this-year' %}selected{% endif %}>{% trans "This year" %}</option>
                    <option value="last-year" {% if request.POST.time == 'last-year' %}selected{% endif %}>{% trans "Last year" %}</option>
                    <option value="all-time" {% if request.POST.time == 'all-time' %}selected{% endif %}>{% trans "All time" %}</option>
                    <option value="custom" {% if request.POST.time == 'custom' %}selected{% endif %}>{% trans "Custom" %}</option>
                </select>
                
                {#  Custom time range  #}
                <div id="custom_time_range" style="{% if request.POST.time != 'custom' %}display: none;{% endif %}">
                    <label for="start_date" class="form-label">{% trans "Start date" %}:</label>
                    <input type="datetime-local" name="start_date" id="start_date" class="form-control mb-3" {% if request.POST.start_date %}value="{{ request.POST.start_date }}"{% endif %}/>
                    
                    <label for="end_date" class="form-label">{% trans "End date" %}:</label>
                    <input type="datetime-local" name="end_date" id="end_date" class="form-control mb-3" {% if request.POST.end_date %}value="{{ request.POST.end_date }}"{% endif %} />
                </div>
            </div>
            <div class="col-12 col-md-6">
                <label for="account" class="form-label">{% trans "Account" %}:</label>
                <select name="account" id="account" class="form-select mb-3">
                    <option value="all" {% if request.POST.account == 'all' %}selected{% endif %}>{% trans "All accounts" %}</option>
                    {% for account in accounts %}
                    <option value="{{ account.id }}" {% if request.POST.account|to_int == account.id %}selected{% endif %}>{{ account.name }}</option>
                    {% endfor %}
                </select>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary mt-2">{% trans "Apply" %}</button>
                </div>
            </div>

            </div>
        </form>
    
    <div id="chart">
        {% block chart_content %}{% endblock %}
    </div>
    
    <script>
        document.querySelector('select[name="time"]').addEventListener('change', function() {
            var customTimeRange = document.getElementById('custom_time_range');
            if (this.value === 'custom') {
                customTimeRange.style.display = 'block';
            } else {
                customTimeRange.style.display = 'none';
            }
        });
    </script>

{% endblock %}
