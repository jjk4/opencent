{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Offline - OpenCent" %}</title>
    
    <link rel="stylesheet" href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}" />
</head>
<body class="bg-body-tertiary d-flex align-items-center justify-content-center vh-100">
    
    <div class="text-center px-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor" class="text-secondary opacity-75 mb-4" viewBox="0 0 16 16">
            <path d="M10.706 3.294A12.545 12.545 0 0 0 8 3C5.259 3 2.723 3.882 6.61 5.278l-.824 1.427A10.99 10.99 0 0 1 8 4.5c1.22 0 2.392.215 3.479.607l-.824-1.427c-.244-.1-.5-.183-.761-.253l.812-1.411zM10.509 9.5c.246.3.447.632.592.992l1.583-.918a7 7 0 0 0-2.175-1.574V9.5zM2 4.02v1.54A11 11 0 0 0 5.483 11.5l1.046-1.046A9.96 9.96 0 0 1 3.5 7.5c0-.623.056-1.233.16-1.822L2 4.02zM14.659 13.91l-1.045-1.045c.422-.557.77-1.164 1.028-1.815l1.54.891a13 13 0 0 1-1.523 1.969zM8 12a1 1 0 1 1 0-2 1 1 0 0 1 0 2"/>
            <path d="M1.354 2.146a.5.5 0 1 0-.708.708l14 14a.5.5 0 0 0 .708-.708l-14-14zM10.89 11.597 8.5 9.207V12l2.39-.403zM6 7.707 3.5 5.207a9.96 9.96 0 0 1 3-1.636v4.136z"/>
        </svg>

        <h1 class="h2 fw-bold text-body-emphasis mb-3">{% trans "You are offline" %}</h1>
        <p class="text-body-secondary lead mb-4">
            {% trans "Please check your internet connection. OpenCent needs a connection to sync your latest transactions." %}
        </p>
        
        <button onclick="window.location.reload();" class="btn btn-primary btn-lg px-4 rounded-pill shadow-sm">
            <i class="bi bi-arrow-clockwise me-1"></i> {% trans "Try again" %}
        </button>
    </div>

</body>
</html>
